<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#bfe0fb"/>
      <stop offset="50%"  stop-color="#5b9cca"/>
      <stop offset="100%" stop-color="#2c5d82"/>
    </linearGradient>
    <linearGradient id="vg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf5fd"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background — vibrant accent gradient so the mark reads on dark launchers (rofi, etc.) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#sheen)"/>

  <!-- Top accent line — tachometer motif -->
  <line x1="18" y1="13" x2="46" y2="13"
        stroke="rgba(15,30,48,0.32)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- V mark -->
  <path d="M14 19 L32 47 L50 19"
        fill="none" stroke="url(#vg)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
