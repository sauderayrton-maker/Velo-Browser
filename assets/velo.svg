<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="vg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#b0d0ec"/>
      <stop offset="100%" stop-color="#4d8fb8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#09090c"/>

  <!-- Top accent line — tachometer motif -->
  <line x1="18" y1="13" x2="46" y2="13"
        stroke="rgba(138,180,212,0.22)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- V mark -->
  <path d="M14 19 L32 47 L50 19"
        fill="none" stroke="url(#vg)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
