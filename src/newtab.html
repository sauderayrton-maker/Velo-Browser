<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
    font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    background: #0f0e17;
    background-image: radial-gradient(ellipse 90% 55% at 50% -5%,
        rgba(120, 80, 255, 0.14) 0%, transparent 65%);
    color: #fffffe;
    -webkit-user-select: none;
    user-select: none;
}

@media (prefers-color-scheme: light) {
    body {
        background: #fafaf9;
        background-image: radial-gradient(ellipse 90% 55% at 50% -5%,
            rgba(139, 92, 246, 0.08) 0%, transparent 65%);
        color: #0f0e17;
    }
    .bar {
        background: rgba(0, 0, 0, 0.04) !important;
        border-color: rgba(0, 0, 0, 0.08) !important;
        color: #0f0e17 !important;
    }
    .bar::placeholder { color: rgba(0, 0, 0, 0.28) !important; }
    .bar:focus {
        background: rgba(0, 0, 0, 0.06) !important;
        border-color: #7c3aed !important;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.13) !important;
    }
}

.clock {
    font-size: 92px;
    font-weight: 200;
    letter-spacing: -5px;
    line-height: 1;
    opacity: 0.9;
    font-variant-numeric: tabular-nums;
}

.wrap { width: min(580px, 88vw); }

.bar {
    display: block;
    width: 100%;
    padding: 15px 28px;
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.11);
    border-radius: 999px;
    color: #fffffe;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    box-shadow: 0 2px 24px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
    -webkit-user-select: text;
    user-select: text;
}

.bar::placeholder { color: rgba(255, 255, 255, 0.28); }

.bar:focus {
    background: rgba(255, 255, 255, 0.09);
    border-color: #8b5cf6;
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.22),
                0 2px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255,255,255,0.08);
}
</style>
</head>
<body>
<time class="clock" id="clock"></time>
<div class="wrap">
    <form id="form">
        <input class="bar" id="q" type="text"
               placeholder="Search or type a URL"
               spellcheck="false" autocomplete="off" autofocus>
    </form>
</div>
<script>
(function () {
    function tick() {
        var d = new Date();
        document.getElementById('clock').textContent =
            String(d.getHours()).padStart(2,'0') + ':' +
            String(d.getMinutes()).padStart(2,'0');
    }
    tick();
    setInterval(tick, 1000);

    document.getElementById('form').addEventListener('submit', function (e) {
        e.preventDefault();
        var v = document.getElementById('q').value.trim();
        if (!v) return;
        var isUrl = /^https?:\/\//i.test(v) ||
                    (/^[^\s]+\.[^\s.]{2,}(\/|$)/.test(v) && !/\s/.test(v));
        location.href = isUrl
            ? (/^https?:\/\//i.test(v) ? v : 'https://' + v)
            : 'https://www.google.com/search?q=' + encodeURIComponent(v);
    });
}());
</script>
</body>
</html>
